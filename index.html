<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospect Rankings</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        function ProspectRanker() {
          const SHEET_URL = 'https://script.google.com/macros/d/AKfycbyW-y2bwlaPmnhMLcc6Hb4UJ-ZVoZBbjCl7UulSfdUaBgTUCR-YvDteAGLTF5j4yyDP/usercripts';
          const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
          
          const [prospects, setProspects] = React.useState([]);
          const [ranking, setRanking] = React.useState([]);
          const [draggedItem, setDraggedItem] = React.useState(null);
          const [submitted, setSubmitted] = React.useState(false);
          const [currentWeek, setCurrentWeek] = React.useState(1);
          const [history, setHistory] = React.useState([]);
          const [view, setView] = React.useState('rank');
          const [editMode, setEditMode] = React.useState(false);
          const [loading, setLoading] = React.useState(true);

          React.useEffect(() => {
            // Fetch prospects and rankings from Sheet
            fetch(SHEET_URL)
              .then(res => res.json())
              .then(data => {
                setProspects(data.prospects || []);
                
                // Parse rankings from Sheet
                if (data.rankings && data.rankings.length > 0) {
                  const historyMap = {};
                  data.rankings.forEach(row => {
                    const [date, week, prospect, rank, points] = row;
                    if (date && week) { // Only process valid rows
                      if (!historyMap[week]) {
                        historyMap[week] = { week: parseInt(week), date: date, rankings: [] };
                      }
                      historyMap[week].rankings.push({
                        prospect: prospect,
                        points: parseInt(points) || 0
                      });
                    }
                  });
                  
                  const historyArray = Object.values(historyMap).sort((a, b) => a.week - b.week);
                  setHistory(historyArray);
                  
                  if (historyArray.length > 0) {
                    setCurrentWeek(historyArray[historyArray.length - 1].week + 1);
                  }
                }
              })
              .catch(err => console.error('Failed to load Sheet:', err))
              .finally(() => setLoading(false));
          }, []);

          const handleDragStart = (e, prospect) => {
            setDraggedItem(prospect);
            e.dataTransfer.effectAllowed = 'move';
          };

          const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
          };

          const handleDrop = (e, targetProspect) => {
            e.preventDefault();
            if (!draggedItem || draggedItem === targetProspect) return;

            const draggedIndex = ranking.indexOf(draggedItem);
            const targetIndex = ranking.indexOf(targetProspect);

            const newRanking = [...ranking];
            newRanking.splice(draggedIndex, 1);
            newRanking.splice(targetIndex, 0, draggedItem);

            setRanking(newRanking);
            setDraggedItem(null);
          };

          const submitRanking = () => {
            const points = ranking.map((prospect, index) => ({
              prospect,
              points: ranking.length - index
            }));

            const newEntry = {
              week: currentWeek,
              date: new Date().toISOString().split('T')[0],
              rankings: points
            };

            // Send to Google Sheet
            fetch(SHEET_URL, {
              method: 'POST',
              body: JSON.stringify(newEntry)
            }).catch(err => console.error('Failed to log to Sheet:', err));

            setHistory([...history, newEntry]);
            setRanking([]);
            setCurrentWeek(currentWeek + 1);
            setSubmitted(true);
            setTimeout(() => setSubmitted(false), 2000);
          };

          const unrankedProspects = prospects.filter(p => !ranking.includes(p));
          const currentRankings = history.length > 0 
            ? history[history.length - 1].rankings.sort((a, b) => b.points - a.points)
            : [];

          if (loading) {
            return <div style={styles.container}><p style={{textAlign: 'center', color: '#fff', marginTop: '40px'}}>Loading rankings...</p></div>;
          }

          return (
            <div style={styles.container}>
              <div style={styles.header}>
                <div>
                  <h1 style={styles.title}>Prospect Rankings</h1>
                  <p style={styles.subtitle}>{isAdmin ? `Week ${currentWeek}` : 'View Only'}</p>
                </div>
                <div style={styles.nav}>
                  {isAdmin ? (
                    <>
                      <button 
                        onClick={() => setView('rank')}
                        style={{...styles.navBtn, ...(view === 'rank' ? styles.navBtnActive : {})}}
                      >
                        This Week
                      </button>
                      <button 
                        onClick={() => setView('history')}
                        style={{...styles.navBtn, ...(view === 'history' ? styles.navBtnActive : {})}}
                      >
                        History
                      </button>
                    </>
                  ) : (
                    <button 
                      onClick={() => setView(view === 'rank' ? 'history' : 'rank')}
                      style={{...styles.navBtn, ...styles.navBtnActive}}
                    >
                      {view === 'rank' ? 'View Rankings' : 'Back'}
                    </button>
                  )}
                </div>
              </div>

              {isAdmin && view === 'rank' && (
                <div style={styles.content}>
                  <div style={styles.rankingSection}>
                    <h2 style={styles.sectionTitle}>Your Ranking</h2>
                    <div 
                      style={styles.rankingList}
                      onDragOver={handleDragOver}
                    >
                      {ranking.length === 0 ? (
                        <p style={styles.empty}>Drag prospects here to rank them</p>
                      ) : (
                        ranking.map((prospect, index) => (
                          <div
                            key={prospect}
                            draggable
                            onDragStart={(e) => handleDragStart(e, prospect)}
                            onDragOver={handleDragOver}
                            onDrop={(e) => handleDrop(e, prospect)}
                            style={{
                              ...styles.rankCard,
                              opacity: draggedItem === prospect ? 0.5 : 1
                            }}
                          >
                            <div style={styles.rankNumber}>{index + 1}</div>
                            <div style={styles.rankContent}>
                              <span style={styles.prospectName}>{prospect}</span>
                              <span style={styles.points}>{ranking.length - index} pts</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  <div style={styles.unrankedSection}>
                    <h2 style={styles.sectionTitle}>Available</h2>
                    <div style={styles.unrankedList}>
                      {unrankedProspects.length === 0 ? (
                        <p style={styles.empty}>All prospects ranked</p>
                      ) : (
                        unrankedProspects.map(prospect => (
                          <div
                            key={prospect}
                            draggable
                            onDragStart={(e) => handleDragStart(e, prospect)}
                            onDragOver={handleDragOver}
                            onDrop={(e) => handleDrop(e, prospect)}
                            style={{
                              ...styles.unrankedCard,
                              opacity: draggedItem === prospect ? 0.5 : 1
                            }}
                          >
                            {prospect}
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  <div style={styles.actions}>
                    <button
                      onClick={submitRanking}
                      disabled={ranking.length === 0}
                      style={{...styles.submitBtn, ...(ranking.length === 0 ? styles.submitBtnDisabled : {})}}
                    >
                      Submit Ranking
                    </button>
                    {submitted && <p style={styles.successMsg}>✓ Ranking submitted</p>}
                  </div>
                </div>
              )}

              {isAdmin && view === 'history' && (
                <div style={styles.content}>
                  <h2 style={styles.sectionTitle}>Rankings History</h2>
                  
                  {history.length === 0 ? (
                    <p style={styles.empty}>No rankings submitted yet</p>
                  ) : (
                    <>
                      <div style={styles.chartContainer}>
                        <h3 style={styles.chartTitle}>Latest Rankings (Week {history[history.length - 1].week})</h3>
                        <table style={styles.table}>
                          <tbody>
                            {currentRankings.map((r, i) => (
                              <tr key={i} style={styles.tableRow}>
                                <td style={styles.tableCell}>{i + 1}</td>
                                <td style={styles.tableCell}>{r.prospect}</td>
                                <td style={{...styles.tableCell, textAlign: 'right', fontWeight: '600'}}>{r.points} pts</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      <div style={styles.chartContainer}>
                        <h3 style={styles.chartTitle}>Submission Timeline</h3>
                        <div style={styles.timelineList}>
                          {history.map((entry, idx) => (
                            <div key={idx} style={styles.timelineItem}>
                              <div style={styles.timelineMeta}>
                                <strong>Week {entry.week}</strong>
                                <span>{entry.date}</span>
                              </div>
                              <div style={styles.weekRankings}>
                                {entry.rankings.slice(0, 5).map((r, i) => (
                                  <div key={i} style={styles.weekRank}>
                                    {i + 1}. {r.prospect}
                                  </div>
                                ))}
                                {entry.rankings.length > 5 && (
                                  <div style={styles.weekRank}>... and {entry.rankings.length - 5} more</div>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </>
                  )}
                </div>
              )}

              {!isAdmin && (
                <div style={styles.content}>
                  {view === 'rank' && history.length > 0 && (
                    <div style={styles.chartContainer}>
                      <h3 style={styles.chartTitle}>Latest Rankings (Week {history[history.length - 1].week})</h3>
                      <table style={styles.table}>
                        <tbody>
                          {currentRankings.map((r, i) => (
                            <tr key={i} style={styles.tableRow}>
                              <td style={styles.tableCell}>{i + 1}</td>
                              <td style={styles.tableCell}>{r.prospect}</td>
                              <td style={{...styles.tableCell, textAlign: 'right', fontWeight: '600'}}>{r.points} pts</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {view === 'rank' && history.length === 0 && (
                    <p style={styles.empty}>No rankings yet. Check back soon!</p>
                  )}

                  {view === 'history' && (
                    <>
                      <div style={styles.chartContainer}>
                        <h3 style={styles.chartTitle}>All Rankings</h3>
                        <div style={styles.timelineList}>
                          {history.length === 0 ? (
                            <p style={styles.empty}>No rankings submitted yet</p>
                          ) : (
                            history.map((entry, idx) => (
                              <div key={idx} style={styles.timelineItem}>
                                <div style={styles.timelineMeta}>
                                  <strong>Week {entry.week}</strong>
                                  <span>{entry.date}</span>
                                </div>
                                <div style={styles.weekRankings}>
                                  {entry.rankings.slice(0, 5).map((r, i) => (
                                    <div key={i} style={styles.weekRank}>
                                      {i + 1}. {r.prospect}
                                    </div>
                                  ))}
                                  {entry.rankings.length > 5 && (
                                    <div style={styles.weekRank}>... and {entry.rankings.length - 5} more</div>
                                  )}
                                </div>
                              </div>
                            ))
                          )}
                        </div>
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>
          );
        }

        const styles = {
          container: {
            maxWidth: '1200px',
            margin: '0 auto',
            padding: '20px',
            backgroundColor: '#000000',
            minHeight: '100vh'
          },
          header: {
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'flex-start',
            marginBottom: '30px',
            borderBottom: '2px solid #dc2626',
            paddingBottom: '20px'
          },
          title: {
            fontSize: '32px',
            fontWeight: '700',
            margin: '0 0 4px 0',
            color: '#ffffff'
          },
          subtitle: {
            fontSize: '14px',
            color: '#9ca3af',
            margin: 0
          },
          nav: {
            display: 'flex',
            gap: '12px'
          },
          navBtn: {
            padding: '8px 16px',
            border: '1px solid #404040',
            borderRadius: '6px',
            backgroundColor: '#1a1a1a',
            cursor: 'pointer',
            fontSize: '14px',
            fontWeight: '500',
            color: '#9ca3af',
            transition: 'all 0.2s'
          },
          navBtnActive: {
            backgroundColor: '#dc2626',
            color: '#fff',
            borderColor: '#dc2626'
          },
          content: {
            display: 'grid',
            gridTemplateColumns: '1fr 1fr',
            gap: '20px'
          },
          rankingSection: {
            backgroundColor: '#111111',
            borderRadius: '8px',
            padding: '20px',
            border: '1px solid #404040'
          },
          unrankedSection: {
            backgroundColor: '#111111',
            borderRadius: '8px',
            padding: '20px',
            border: '1px solid #404040'
          },
          chartContainer: {
            backgroundColor: '#111111',
            borderRadius: '8px',
            padding: '20px',
            border: '1px solid #404040',
            gridColumn: '1 / -1'
          },
          sectionTitle: {
            fontSize: '16px',
            fontWeight: '600',
            margin: '0 0 16px 0',
            color: '#ffffff'
          },
          chartTitle: {
            fontSize: '14px',
            fontWeight: '600',
            margin: '0 0 16px 0',
            color: '#ffffff'
          },
          rankingList: {
            display: 'flex',
            flexDirection: 'column',
            gap: '8px',
            minHeight: '300px'
          },
          rankCard: {
            display: 'flex',
            alignItems: 'center',
            gap: '12px',
            padding: '12px',
            backgroundColor: '#1a1a1a',
            border: '2px solid #404040',
            borderRadius: '6px',
            cursor: 'grab'
          },
          rankNumber: {
            fontSize: '18px',
            fontWeight: '700',
            color: '#dc2626',
            minWidth: '28px',
            textAlign: 'center'
          },
          rankContent: {
            flex: 1,
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center'
          },
          prospectName: {
            fontWeight: '500',
            color: '#ffffff'
          },
          points: {
            fontSize: '12px',
            color: '#9ca3af',
            fontWeight: '500'
          },
          unrankedList: {
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))',
            gap: '8px'
          },
          unrankedCard: {
            padding: '12px',
            backgroundColor: '#1a1a1a',
            border: '2px dashed #dc2626',
            borderRadius: '6px',
            cursor: 'grab',
            fontSize: '14px',
            fontWeight: '500',
            color: '#dc2626',
            textAlign: 'center'
          },
          actions: {
            gridColumn: '1 / -1',
            display: 'flex',
            gap: '12px',
            alignItems: 'center'
          },
          submitBtn: {
            padding: '12px 24px',
            backgroundColor: '#dc2626',
            color: '#fff',
            border: 'none',
            borderRadius: '6px',
            cursor: 'pointer',
            fontWeight: '600',
            fontSize: '14px'
          },
          submitBtnDisabled: {
            backgroundColor: '#404040',
            cursor: 'not-allowed'
          },
          successMsg: {
            color: '#22c55e',
            fontSize: '14px',
            margin: 0
          },
          empty: {
            textAlign: 'center',
            color: '#6b7280',
            padding: '20px',
            fontStyle: 'italic'
          },
          table: {
            width: '100%',
            borderCollapse: 'collapse',
            fontSize: '14px'
          },
          tableRow: {
            borderBottom: '1px solid #404040'
          },
          tableCell: {
            padding: '10px 0',
            textAlign: 'left',
            color: '#d1d5db'
          },
          timelineList: {
            display: 'flex',
            flexDirection: 'column',
            gap: '12px'
          },
          timelineItem: {
            padding: '12px',
            backgroundColor: '#1a1a1a',
            borderRadius: '6px',
            borderLeft: '3px solid #dc2626'
          },
          timelineMeta: {
            display: 'flex',
            justifyContent: 'space-between',
            fontSize: '12px',
            marginBottom: '8px',
            color: '#9ca3af'
          },
          weekRankings: {
            fontSize: '13px',
            lineHeight: '1.6',
            color: '#d1d5db'
          },
          weekRank: {
            marginBottom: '4px'
          }
        };

        ReactDOM.render(<ProspectRanker />, document.getElementById('root'));
    </script>
</body>
</html>
